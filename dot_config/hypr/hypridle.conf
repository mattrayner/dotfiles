general {
    lock_cmd = omarchy-lock-screen                         # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend.
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# --- Battery Listeners (Shorter timeouts) ---

listener {
    timeout = 120                                             # 2min
    on-timeout = if ! /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then pidof hyprlock || omarchy-launch-screensaver; fi
}

listener {
    timeout = 121                                             # 2min 1s
    on-timeout = if ! /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then loginctl lock-session; fi
}

listener {
    timeout = 150                                            # 2.5min
    on-timeout = if ! /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then brightnessctl -sd '*::kbd_backlight' set 0; fi
    on-resume = brightnessctl -rd '*::kbd_backlight'
}

listener {
    timeout = 150                                            # 2.5min
    on-timeout = if ! /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then hyprctl dispatch dpms off; fi
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# --- AC (Plugged In) Listeners (Longer timeouts) ---

listener {
    timeout = 300                                             # 5min
    on-timeout = if /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then pidof hyprlock || omarchy-launch-screensaver; fi
}

listener {
    timeout = 301                                             # 5min 1s
    on-timeout = if /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then loginctl lock-session; fi
}

listener {
    timeout = 600                                            # 10min
    on-timeout = if /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then brightnessctl -sd '*::kbd_backlight' set 0; fi
    on-resume = brightnessctl -rd '*::kbd_backlight'
}

listener {
    timeout = 600                                            # 10min
    on-timeout = if /home/matt/.local/share/omarchy/bin/omarchy-ac-present; then hyprctl dispatch dpms off; fi
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}